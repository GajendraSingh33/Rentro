version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rentro-postgres
    environment:
      POSTGRES_USER: rentro_user
      POSTGRES_PASSWORD: rentro_password
      POSTGRES_DB: rentro_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentro_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentro-network

  redis:
    image: redis:7-alpine
    container_name: rentro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rentro-network

  backend:
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
    container_name: rentro-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://rentro_user:rentro_password@postgres:5432/rentro_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key_change_in_production
      JWT_EXPIRY: 24h
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app/apps/backend
    networks:
      - rentro-network

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend.Dockerfile
    container_name: rentro-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app/apps/frontend
    networks:
      - rentro-network

volumes:
  postgres_data:
  redis_data:

networks:
  rentro-network:
    driver: bridge
